workspace_root: "."
llm:
  provider: openai
  model: DeepSeek-R1
  temperature: 0.2
  base_url: https://njusehub.info/v1
permission:
  rules:
    - name: ask before writes
      pattern: .*
      verdict: ask
      rule_type: path
      tools:
        - write_file
        - replace_once
        - edit_file
memory:
  enabled: true
